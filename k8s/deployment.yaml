apiVersion: apps/v1
kind: Deployment
metadata:
  name: reachout-bot
  labels:
    app: reachout-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reachout-bot
  template:
    metadata:
      labels:
        app: reachout-bot
    spec:
      containers:
        - name: reachout-bot
          image: reachout-bot:latest
          ports:
            - containerPort: 3000
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: ANTHROPIC_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: SUPABASE_KEY
            - name: DASHBOARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: DASHBOARD_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10