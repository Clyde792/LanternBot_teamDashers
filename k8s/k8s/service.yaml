apiVersion: v1
kind: Service
metadata:
  name: reachout-bot-service
  namespace: reachout
  labels:
    app: reachout-bot
spec:
  selector:
    app: reachout-bot
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP       # Internal only — Ingress handles external traffic